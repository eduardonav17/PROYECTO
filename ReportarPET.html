<!DOCTYPE html>
<html lang="es">

<head>

<!--Configuración de caracteres-->
<meta charset="UTF-8">

<!--Adaptación a celulares-->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!--Título de la página-->
<title>Reportar mascota | PETfriends Hub</title>

<!--Icono de la pestaña-->
<link rel="icon" type="image/webp" href="imagenes/logo.webp">

<!--Archivo de estilos CSS-->
<link rel="stylesheet" href="style.css">

</head>

<body>

<!--Encabezado principal de la página-->
<header class="header">

    <!--Logo del sitio-->
    <a href="index.html" class="logo logo-link">
        <img src="imagenes/logo.webp" alt="logo de la pagina PETfriends hub con un perro y un gato representando adopcion de mascotas">
    </a>

    <!--Menú de navegación-->
    <nav>
        <ul class="nav-links">
            <li><a href="registroarescatista.html">Registro Rescatista</a></li>
            <li><a href="yaheadoptado.html">Ya eh Adoptado</a></li>
            <li><a href="donacionesvoluntarias.html">Donaciones Voluntarias</a></li>
            <li><a href="acceder.html">Acceder</a></li>
        </ul>
    </nav>

    <!--Botón para ir a reportar mascota-->
    <a href="reportarpet.html" class="btn">
        <button>Reportar</button>
    </a>

</header>

<main>

<!--Sección donde se muestran los tipos de reportes-->
<section class="reportes">

    <!--Tarjeta para mascota perdida-->
    <article class="carda">
        <h3>PET PERDIDO</h3>
        <p>Reportar una mascota que se ha perdido.</p>
        <a href="perdido.html">
            <button>Reportar</button>
        </a>
    </article>

    <!--Tarjeta para mascota encontrada-->
    <article class="carda">
        <h3>PET ENCONTRADO</h3>
        <p>Indica si encontraste una mascota.</p>
        <a href="encontrado.html">
            <button>Reportar</button>
        </a>
    </article>

    <!--Tarjeta para maltrato animal-->
    <article class="carda">
        <h3>MALTRATO ANIMAL</h3>
        <p>Reportar casos de maltrato.</p>
        <a href="maltrato.html">
            <button>Reportar</button>
        </a>
    </article>

    <!--Tarjeta para publicar mascota en adopción-->
    <article class="carda">
        <h3>EN ADOPCIÓN</h3>
        <p>Publica mascotas para adopción.</p>
        <a href="enadopcion.html">
            <button>Publicar</button>
        </a>
    </article>

</section>

</main>

</body>
</html>

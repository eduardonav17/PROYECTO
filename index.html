<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!--Titulo de la pagina web-->
<title>PETfriends hub</title>

<!--Icono de la pestaña-->
<link rel="icon" type="logo-img" href="imagenes/logo.webp">

<!--Css enlazados-->
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="estilos2.css">

<!--Iconos de fontawesome para redes sociales y buscador-->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!--La clase del header esta en el css 4-->
<!--Codigo para menus y logo de la parte arriba-->
<header class="header">

    <!--Logo de la pagina-->
    <a href="index.html" class="logo logo-link">
        <img src="imagenes/logo.webp" 
        alt="logo de la pagina PETfriends hub con un perro y un gato representando adopcion de mascotas">
    </a>

    <!--Menu de navegacion principal-->
    <nav>
        <ul class="nav-links">
            <li><a href="registroarescatista.html">Registro Rescatista</a></li>
            <li><a href="yaheadoptado.html">Ya eh Adoptado</a></li>
            <li><a href="donacionesvoluntarias.html">Donaciones Voluntarias</a></li>
            <li><a href="acceder.html">Acceder</a></li>
        </ul>
    </nav>

    <!--Boton para reportar mascotas-->
    <a href="reportarpet.html" class="btn">
        <button>Reportar</button>
    </a>

</header>
<!--Aqui termina el header-->

<!--El main indica que es el contenido principal de la pagina-->
<main>

    <!-- Sección principal o hero -->
    <section class="hero">

        <!--Frase principal-->
        <p style="font-family: Verdana;color: rgb(6, 91, 112); font-size: 25px;">
            Adopta y cambia TU vida.
        </p>

        <!--Frase secundaria-->
        <h2 style="font-family: Verdana;color: darkgoldenrod; font-size: 40px;">
        Adopta. Rescata. Ayuda.
        </h2>

        <!--Buscador de mascotas-->
        <form class="Busqueda">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="palabras clave">
        </form>

    </section>

<hr>

<!--Titulo de la seccion de adopcion-->
<h1 class="titulopg">
¿Quieres Adoptar un perro o un gato?
</h1>

<!--Seccion de categorias de mascotas-->
<section class="contenedor-categorias">

    <!--Contenedor de las tarjetas-->
    <article class="categorias">

        <!--Tarjeta de perros-->
        <a href="perrosadopcion.html" class="card">
            <img src="imagenes/perro.webp" alt="Perros en adopción">

            <!--Texto que aparece encima de la imagen-->
            <section class="overlay">
                <h2>Perros</h2>
                <p>Ver Mascotas</p>
            </section>
        </a>

        <!--Tarjeta de gatos-->
        <a href="gatosadopcion.html" class="card">
            <img src="imagenes/gato.webp" alt="Gatos en adopción">

            <!--Texto encima de la imagen-->
            <section class="overlay">
                <h2>Gatos</h2>
                <p>Ver Mascotas</p>
            </section>
        </a>

    </article>

</section>

<!--Codigo para poder mostrar las redes sociales-->
<section class="social-container">

    <!--Facebook-->
    <a href="https://www.facebook.com/share/14Z8LPZGKuT/" class="social-icon facebook">
        <i class="fa-brands fa-facebook"></i>
    </a>

    <!--Instagram-->
    <a href="https://www.instagram.com/petfriends.hub26?igsh=MWN5YmR2eTg4aW0zaw==" class="social-icon instagram">
        <i class="fa-brands fa-instagram"></i>
    </a>

    <!--Seccion acerca de nosotros-->
    <a href="acercadenosotros.html" class="social-icon acerca">
        <i class="fa-solid fa-users"></i>
    </a>

</section>

<!--Titulo de la seccion de adopcion-->
<h1 class="titulopg">
Veterinarias
</h1>

</main>

<!--Pie de pagina-->
<footer class="cre">
@PETfriends hub 2026
</footer>

</body>
</html>

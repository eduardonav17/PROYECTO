   <!--REPORTAR PET HTML-->
 <input type="checkbox" id="activar-pestaña" style="display: none;">
<label for="activar-pestaña" class="btn" style="cursor: pointer; display: inline-block;">
    REPORTAR PET
</label>

<div class="overlay-pestaña">
    <div class="ventana-blanca">
        <div class="encabezado-pestaña">
            <span>Opciones de Reporte</span>
            <label for="activar-pestaña" class="cerrar-pestaña">&times;</label>
        </div>
        
        <iframe src="ReportarPET.html" class="contenido-iframe"></iframe>
    </div>

</header>

</header>

<!--Video de fondo-->
<section class="hero-video">
    <video autoplay muted loop playsinline class="video-bg">
        <source src="gatos.mp4" type="video/mp4">
    </video>

    <div class="hero-overlay"></div>

    <div class="hero-content">
        <div class="text-box">
            <h1>GATOS</h1>
            <p>Encuentra a tu mejor amigo</p>
        </div>
    </div>
</section>

    <section class="filtros">
        <h3>Filtrar búsqueda</h3>
        
        <!--Sexo-->
        <div class="grupo">
        <label>SEXO</label>
        <div class="radio-group">
            <label><input type="radio" name="sexo">Macho</label>
            <label><input type="radio" name="sexo">Hembra</label>
        </div>
     </div>
    
     <!--Edad-->
     <div class="grupo">
        <label>EDAD</label>
        <select>
            <option>--</option>
            <option>Cachorro (menos de 1 año)</option>
            <option>Joven (de 1 a 4 años)</option>
            <option>Adulto (4-9 años)</option>
            <option>Senior (más de 9 años)</option>
        </select>
     </div>

     <!--Tamaño-->
     <div class="grupo">
        <label>TAMAÑO</label>
        <select>
            <option>--</option>
            <option>Pequeño (hasta 10 kg)</option>
            <option>Mediano (de 10 a 25 kg)</option>
            <option>Grande (de 25 a 40 kg)</option>
        </select>
     </div>

     <!--Tipo de Pelaje-->
     <div class="grupo">
        <label>TIPO DE PELAJE</label>
        <select>
            <option>--</option>
            <option>Corto</option>
            <option>Medio</option>
            <option>Largo</option>
            <option>Sin pelo (tipo sphynx)</option>
        </select>
     </div>

     <!--Color-->
     <div class="grupo">
        <label>Color</label>
        <select>
            <option>--</option>
            <option>Negro</option>
            <option>Blanco</option>
            <option>Gris</option>
            <option>Naranja</option>
            <option>Atrigado</option>
            <option>Bicolor</option>
            <option>Tricolor</option>
            <option>Carey</option>
        </select>
     </div>

     <!--Nivel de actividad-->
     <div class="grupo">
        <label>NIVEL DE ACTIVIDAD</label>
        <select>
            <option>--</option>
            <option>Tranquilo</option>
            <option>Juguetón</option>
            <option>Muy Activo</option>
            <option>Independiente</option>
        </select>
       </div>

     <!--Boton de busqueda-->
     <button class="btn-filtrar">Buscar</button>
    </section>

</body>
</html>

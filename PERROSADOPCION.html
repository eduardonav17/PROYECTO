<body>

        <header class="header">
            <div class="logo">
                <a href="index.html" class="logo-link">
                    <img src="imagenes/logop.png">
                </a>
            </div>
            <nav>

<!--Video de fondo-->
<section class="hero-video">
    <video autoplay muted loop playsinline class="video-bg">
        <source src="videos/perros3.mp4" type="video/mp4">
    </video>

    <div class="hero-overlay"></div>

    <div class="hero-content">
        <div class="text-box">
            <h1>PERROS</h1>
            <p>Encuentra a tu mejor amigo</p>
        </div>
    </div>
 </section>

    <section class="filtros">
        <h3>Filtrar búsqueda</h3>
        
        <!--Sexo-->
        <div class="grupo">
        <label>SEXO</label>
        <div class="radio-group">
            <label><input type="radio" name="sexo">Macho</label>
            <label><input type="radio" name="sexo">Hembra</label>
        </div>
     </div>
    
     <!--Categoria-->
     <div class="grupo">
        <label>CATEGORÍA</label>
        <select>
            <option>--</option>
            <option>Cachorro (menos de 1 año)</option>
            <option>Joven (de 1 a 4 años)</option>
            <option>Adulto (4-9 años)</option>
            <option>Senior (más de 9 años)</option>
        </select>
     </div>

     <!--Tamaño-->
     <div class="grupo">
        <label>TAMAÑO</label>
        <select>
            <option>--</option>
            <option>Pequeño (hasta 10 kg)</option>
            <option>Mediano (de 10 a 25 kg)</option>
            <option>Grande (de 25 a 40 kg)</option>
            <option>Gigante (más de 40 kg)</option>
        </select>
     </div>

     <!--Tipo de pelaje-->
     <div class="grupo">
        <label>TIPO DE PELAJE</label>
        <select>
            <option>--</option>
            <option>Corto</option>
            <option>Medio</option>
            <option>Largo</option>
            <option>Rizado</option>
        </select>
     </div>

     <!--Color-->
     <div class="grupo">
        <label>COLOR</label>
        <select>
            <option>--</option>
            <option>Negro</option>
            <option>Blanco</option>
            <option>Café</option>
            <option>Gris</option>
            <option>Atigrado</option>
            <option>Manchas</option>
        </select>
     </div>

     <!--Nivel de energía-->
     <div class="grupo">
        <label>NIVEL DE ENERGÍA</label>
        <select>
            <option>--</option>
            <option>Tranquilo</option>
            <option>Moderado</option>
            <option>Muy activo</option>
        </select>
       </div>

     <!--Boton de busqueda-->
     <button class="btn-filtrar">Buscar</button>
    </section>



</body>
</html>

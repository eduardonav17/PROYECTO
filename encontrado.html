<!DOCTYPE html>
<html lang="es">

<head>

<!--Configuración de caracteres-->
<meta charset="UTF-8">

<!--Adaptación a dispositivos móviles-->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!--Título de la página-->
<title>Pet Encontrado</title>

<!--Icono de la pestaña-->
<link rel="icon" type="image/webp" href="imagenes/logo.webp">

<!--Archivo de estilos-->
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="estilos2.css">

</head>

<body>

<!--Encabezado principal con logo y menú-->
<header class="header">

<!--Logo del sitio-->
<a href="index.html" class="logo logo-link">
<img src="imagenes/logo.webp" alt="logo de la pagina PETfriends hub con un perro y un gato representando adopcion de mascotas">
</a>

<!--Menú de navegación-->
<nav>
<ul class="nav-links">
<li><a href="registroarescatista.html">Registro Rescatista</a></li>
<li><a href="yaheadoptado.html">Ya eh Adoptado</a></li>
<li><a href="donacionesvoluntarias.html">Donaciones Voluntarias</a></li>
<li><a href="acceder.html">Acceder</a></li>
</ul>
</nav>

<!--Botón para reportar-->
<a href="reportarpet.html" class="btn">
<button>Reportar</button>
</a>

</header>

<main>

<!--Sección del formulario para reportar mascotas encontradas-->
<section class="contenedor">

<h2>Reportar Pet Encontrado</h2>

<!--Formulario de reporte-->
<form>

<!--Foto de la mascota encontrada-->
<div class="grupo">
<label>Foto de la mascota</label>
<input type="file" accept="image/*" required>
</div>

<!--Nombre o apodo-->
<div class="grupo">
<label>Nombre de Apodo</label>
<input type="text" placeholder="Ej. Max" required>
</div>

<!--Tipo de mascota-->
<div class="grupo">
<label>Tipo</label>
<select required>
<option value="">Selecciona una opción</option>
<option>Perro</option>
<option>Gato</option>
</select>
</div>

<!--Raza-->
<div class="grupo">
<label>Raza</label>
<input type="text" placeholder="Ej. Labrador">
</div>

<!--Color-->
<div class="grupo">
<label>Color</label>
<input type="text" placeholder="Ej. Café con blanco">
</div>

<!--Fecha en que se encontró-->
<div class="grupo">
<label>Fecha de encuentro</label>
<input type="date" required>
</div>

<!--Lugar donde fue encontrado-->
<div class="grupo">
<label>Lugar donde se encontró</label>
<input type="text" placeholder="Colonia, calle" required>
</div>

<!--Descripción del animal-->
<div class="grupo">
<label>Descripción</label>
<textarea rows="4" placeholder="Señas particulares..." required></textarea>
</div>

<!--Teléfono de contacto-->
<div class="grupo">
<label>Teléfono de contacto</label>
<input type="tel" placeholder="351-000-0000" required>
</div>

<!--Botón para enviar el reporte-->
<button class="pub" type="submit">Reportar avistamiento</button>

</form>

</section>

</main>

</body>
</html>

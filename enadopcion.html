<!DOCTYPE html>
<html lang="es">

<head>

<!--Configuración de caracteres-->
<meta charset="UTF-8">

<!--Adaptación a dispositivos móviles-->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!--Título de la página-->
<title>Pet En Adopción</title>

<!--Icono de la pestaña-->
<link rel="icon" type="image/webp" href="imagenes/logo.webp">

<!--Archivo de estilos-->
<link rel="stylesheet" href="style.css">

</head>

<body>

<!--Encabezado con logo y menú-->
<header class="header">

    <!--Logo del sitio-->
    <a href="index.html" class="logo logo-link">
        <img src="imagenes/logo.webp" alt="logo de la pagina PETfriends hub con un perro y un gato representando adopcion de mascotas">
    </a>

    <!--Menú de navegación-->
    <nav>
        <ul class="nav-links">
            <li><a href="registroarescatista.html">Registro Rescatista</a></li>
            <li><a href="yaheadoptado.html">Ya eh Adoptado</a></li>
            <li><a href="donacionesvoluntarias.html">Donaciones Voluntarias</a></li>
            <li><a href="acceder.html">Acceder</a></li>
        </ul>
    </nav>

    <!--Botón para reportar-->
    <a href="reportarpet.html" class="btn">
        <button>Reportar</button>
    </a>

</header>

<main>

<!--Sección del formulario para publicar mascotas en adopción-->
<section class="contenedor">

<h2>Dar Pet en Adopción</h2>

<!--Formulario de registro de mascota-->
<form>

<!--Foto de la mascota-->
<div class="grupo">
<label>Foto de la mascota</label>
<input type="file" accept="image/*" required>
</div>

<!--Nombre de la mascota-->
<div class="grupo">
<label>Nombre</label>
<input type="text" placeholder="Ej. Max" required>
</div>

<!--Tipo de mascota-->
<div class="grupo">
<label>Tipo</label>
<select required>
<option value="">Selecciona una opción</option>
<option>Perro</option>
<option>Gato</option>
</select>
</div>

<!--Raza-->
<div class="grupo">
<label>Raza</label>
<input type="text" placeholder="Ej. Labrador">
</div>

<!--Color-->
<div class="grupo">
<label>Color</label>
<input type="text" placeholder="Ej. Café con blanco">
</div>

<!--Lugar de adopción-->
<div class="grupo">
<label>Lugar donde se da en adopción</label>
<input type="text" placeholder="Colonia, calle" required>
</div>

<!--Descripción de la mascota-->
<div class="grupo">
<label>Descripción</label>
<textarea rows="4" placeholder="Señas particulares..." required></textarea>
</div>

<!--Teléfono de contacto-->
<div class="grupo">
<label>Teléfono de contacto</label>
<input type="tel" placeholder="351-000-0000" required>
</div>

<!--Botón para publicar-->
<button type="submit" class="pub">Publicar Adopción</button>

</form>

</section>

</main>
<!--Todo lo que se agregue debe ir dentro del main-->

</body>
</html>
